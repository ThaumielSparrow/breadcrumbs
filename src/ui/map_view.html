<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Track Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>html,body,#map{height:100%;margin:0;padding:0}</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map').setView([0,0], 2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  let polyline = null;
  function plotTrack(track) {
    // track: array of [lat,lon]
    if (polyline) polyline.remove();
    polyline = L.polyline(track, {weight:4}).addTo(map);
    map.fitBounds(polyline.getBounds());
    // start / end markers
    if (track.length) {
      L.marker(track[0]).addTo(map).bindPopup('Start').openPopup();
      L.marker(track[track.length-1]).addTo(map).bindPopup('Last');
    }
  }
  // expose to Qt
  window.plotTrack = plotTrack;
</script>
</body>
</html>
