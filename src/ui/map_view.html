<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Track Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Leaflet + hotline via jsDelivr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    html, body, #map { height: 100%; margin: 0; padding: 0; }

    /* Legend overlay */
    #legend {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 1000;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 10px;
      padding: 10px 12px;
      width: 240px;
      font-family: sans-serif;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      display: none;
    }
    #legend-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    #legend-bar {
      height: 12px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.15);
      margin-bottom: 6px;
    }
    #legend-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      opacity: 0.9;
    }

    /* attribution text */
    .leaflet-control-attribution {
      font-size: 12px !important;
      background: rgba(255, 255, 255, 0.75) !important;
      padding: 2px 5px !important;
    }

    /* Helpful error message if Leaflet fails to load */
    #msg {
      position: absolute;
      left: 10px;
      top: 10px;
      z-index: 2000;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 10px;
      padding: 8px 10px;
      font-family: sans-serif;
      display: none;
      max-width: 560px;
    }
  </style>
</head>

<body>
<div id="map"></div>

<div id="msg"></div>

<div id="legend">
  <div id="legend-title"></div>
  <div id="legend-bar"></div>
  <div id="legend-labels">
    <span id="legend-min"></span>
    <span id="legend-max"></span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-hotline@0.4.0/dist/leaflet.hotline.min.js"></script>

<script>
  var map = null;
  var basemaps = {};

  // Full route (static) + trail (growing) + head (dynamic partial segment)
  var fullLayer = null;
  var trailLayer = null;
  var headLayer = null;

  // Markers
  var startMarker = null;
  var endMarker = null;
  var droneMarker = null;

  // Track data
  var fullData = null;       // [[lat, lon, z], ...]
  var fullMeta = null;

  // Playback timeline
  var timelineS = null;      // [seconds...], same length as fullData
  var durationS = 0.0;

  // Playback state (JS-driven for smoothness)
  var playing = false;
  var speedMult = 1.0;
  var playheadS = 0.0;
  var lastFrameMs = null;

  // Render cache
  var lastTrailIndex = -1;   // last integer point included in trail
  var lastProgress = 0.0;    // float index progress

  // Toggles
  var followMode = false;
  var fullPathVisible = true;
  var smoothEnabled = true;

  // Viridis-ish palette
  var palette = {
    0.0: "#440154",
    0.25: "#3b528b",
    0.5: "#21918c",
    0.75: "#5ec962",
    1.0: "#fde725"
  };

  function showMsg(text) {
    var el = document.getElementById("msg");
    el.textContent = text;
    el.style.display = "block";
  }

  function ensureMap() {
    if (map) return true;

    if (typeof L === "undefined") {
      showMsg("Map error: Leaflet failed to load (L is undefined). If you are using Qt WebEngine, ensure LocalContentCanAccessRemoteUrls is enabled.");
      return false;
    }

    // Disable default bottom-right attribution so we can move it to bottom-left
    map = L.map("map", {
      attributionControl: false
    }).setView([0, 0], 2);

    var customAttribution = L.control.attribution({ position: 'bottomleft' }).addTo(map);
    customAttribution.setPrefix('');

    // 1. Normal OpenStreetMap
    var osmLayer = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { 
      maxZoom: 19,
      attribution: 'Map data from <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    });

    // 2. Esri Satellite Imagery
    var satLayer = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", { 
      maxZoom: 19,
      attribution: 'Powered by <a href="https://www.esri.com/">Esri</a>'
    });

    // 3. OpenTopoMap (Terrain)
    // var terLayer = L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", { 
    //   maxZoom: 17, // TopoMap only supports up to zoom level 17
    //   attribution: 'Map data from <a href="https://opentopomap.org/about">OpenTopoMap</a>'
    // });

    baseMaps = {
      "Normal": osmLayer,
      "Satellite": satLayer,
      // "Terrain": terLayer
    };

    // Add the default layer
    osmLayer.addTo(map);
    
    // (Optional) Add Leaflet's native layer switcher widget to the top right of the map
    L.control.layers(baseMaps).addTo(map);

    return true;
  }

  // --- Public API for Python to switch base maps ---
  window.setBaseMap = function(name) {
    if (!map) return;
    
    // Remove currently active base map
    for (var key in baseMaps) {
      if (map.hasLayer(baseMaps[key])) {
        map.removeLayer(baseMaps[key]);
      }
    }
    
    // Add the selected one
    if (baseMaps[name]) {
      baseMaps[name].addTo(map);
    }
  };

  function gradientCSSFromPalette(p) {
    var stops = Object.keys(p).map(parseFloat).sort(function(a,b){ return a-b; });
    var parts = stops.map(function(s){
      var pct = Math.round(s * 100);
      return p[s] + " " + pct + "%";
    });
    return "linear-gradient(to right, " + parts.join(", ") + ")";
  }

  function setLegend(meta) {
    var legend = document.getElementById("legend");
    var title = document.getElementById("legend-title");
    var bar = document.getElementById("legend-bar");
    var lmin = document.getElementById("legend-min");
    var lmax = document.getElementById("legend-max");

    if (!meta) {
      legend.style.display = "none";
      return;
    }

    title.textContent = meta.title || "";
    bar.style.background = gradientCSSFromPalette(palette);
    lmin.textContent = meta.label_min || "";
    lmax.textContent = meta.label_max || "";
    legend.style.display = "block";
  }

  // Simple quadcopter-ish SVG icon (inline)
  var quadSvg =
    '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">' +
    '<circle cx="16" cy="16" r="10" fill="#111"/>' +
    '<circle cx="48" cy="16" r="10" fill="#111"/>' +
    '<circle cx="16" cy="48" r="10" fill="#111"/>' +
    '<circle cx="48" cy="48" r="10" fill="#111"/>' +
    '<rect x="28" y="28" width="8" height="8" rx="2" fill="#ffcc00"/>' +
    '<path d="M16 16 L32 32 L48 16" stroke="#ffcc00" stroke-width="4" fill="none" stroke-linecap="round"/>' +
    '<path d="M16 48 L32 32 L48 48" stroke="#ffcc00" stroke-width="4" fill="none" stroke-linecap="round"/>' +
    '</svg>';

  var quadIcon = null;
  function ensureQuadIcon() {
    if (quadIcon) return;
    quadIcon = L.icon({
      iconUrl: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(quadSvg),
      iconSize: [28, 28],
      iconAnchor: [14, 14]
    });
  }

  function removeLayerSafe(layer) {
    try { if (layer) layer.remove(); } catch (e) {}
  }

  function point2d(p) { return [p[0], p[1]]; }

  function hotlineOpts(meta, weight) {
    return {
      min: meta && typeof meta.min === "number" ? meta.min : 0,
      max: meta && typeof meta.max === "number" ? meta.max : 1,
      palette: palette,
      weight: weight,
      outlineWidth: 1,
      outlineColor: "#000",
      opacity: 1.0
    };
  }

  function makeRouteLayer(data3, meta, weight) {
    if (L.hotline) {
      return L.hotline(data3, hotlineOpts(meta, weight));
    }
    return L.polyline(data3.map(point2d), { weight: weight });
  }

  function applyFullVisibilityNow() {
    if (!map || !fullLayer) return;
    try {
      if (fullPathVisible) {
        if (!map.hasLayer(fullLayer)) fullLayer.addTo(map);
      } else {
        if (map.hasLayer(fullLayer)) fullLayer.remove();
      }
    } catch (e) {
      // fallback: style
      try { fullLayer.setStyle({ opacity: fullPathVisible ? 1.0 : 0.0 }); } catch (e2) {}
    }
  }

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function computeDuration() {
    if (timelineS && timelineS.length) {
      durationS = Number(timelineS[timelineS.length - 1]) || 0.0;
    } else if (fullData && fullData.length) {
      durationS = fullData.length - 1;
    } else {
      durationS = 0.0;
    }
  }

  // Find rightmost index i where timelineS[i] <= t (like bisect_right - 1).
  function bisectRightMinus1(arr, t) {
    var lo = 0;
    var hi = arr.length - 1;
    while (lo < hi) {
      var mid = (lo + hi + 1) >> 1;
      if (arr[mid] <= t) lo = mid;
      else hi = mid - 1;
    }
    return lo;
  }

  function timeToProgress(t) {
    if (!fullData || fullData.length < 2) return 0.0;
    var n = fullData.length;

    if (!timelineS || timelineS.length !== n) {
      var p = clamp(t, 0.0, n - 1);
      return p;
    }

    if (t <= timelineS[0]) return 0.0;
    if (t >= timelineS[n - 1]) return n - 1;

    var i = bisectRightMinus1(timelineS, t);
    i = clamp(i, 0, n - 2);

    var t0 = timelineS[i];
    var t1 = timelineS[i + 1];
    var frac = (t1 > t0) ? ((t - t0) / (t1 - t0)) : 0.0;
    frac = clamp(frac, 0.0, 1.0);

    if (!smoothEnabled) frac = 0.0;
    return i + frac;
  }

  function ensureTrailToIndex(targetIndex) {
    if (!fullData || fullData.length < 2) return;

    if (targetIndex < 1) {
      removeLayerSafe(trailLayer); trailLayer = null;
      removeLayerSafe(headLayer); headLayer = null;
      lastTrailIndex = targetIndex;
      return;
    }

    if (!trailLayer) {
      var sub = fullData.slice(0, targetIndex + 1);
      trailLayer = makeRouteLayer(sub, fullMeta, 9);
      trailLayer.addTo(map);
      lastTrailIndex = targetIndex;
      return;
    }

    var bigJump = (lastTrailIndex >= 0) ? (Math.abs(targetIndex - lastTrailIndex) > 500) : true;
    if (targetIndex < lastTrailIndex || bigJump) {
      removeLayerSafe(trailLayer); trailLayer = null;
      var sub2 = fullData.slice(0, targetIndex + 1);
      trailLayer = makeRouteLayer(sub2, fullMeta, 9);
      trailLayer.addTo(map);
      lastTrailIndex = targetIndex;
      return;
    }

    if (targetIndex > lastTrailIndex) {
      for (var j = lastTrailIndex + 1; j <= targetIndex; j++) {
        try {
          if (L.hotline) {
            trailLayer.addLatLng(fullData[j]);     // [lat,lon,z]
          } else {
            trailLayer.addLatLng(point2d(fullData[j]));
          }
        } catch (e) {
          removeLayerSafe(trailLayer); trailLayer = null;
          var sub3 = fullData.slice(0, targetIndex + 1);
          trailLayer = makeRouteLayer(sub3, fullMeta, 9);
          trailLayer.addTo(map);
          break;
        }
      }
      lastTrailIndex = targetIndex;
    }
  }

  function updateHeadSegment(i, lat, lon, z, frac) {
    if (!smoothEnabled || frac <= 0.0) {
      removeLayerSafe(headLayer); headLayer = null;
      return;
    }
    if (!fullData || i < 0 || i >= fullData.length - 1) {
      removeLayerSafe(headLayer); headLayer = null;
      return;
    }

    var a = fullData[i];
    var b = [lat, lon, z];
    var headData = [a, b];

    if (!headLayer) {
      headLayer = makeRouteLayer(headData, fullMeta, 9);
      headLayer.addTo(map);
      return;
    }

    try {
      if (L.hotline) headLayer.setLatLngs(headData);
      else headLayer.setLatLngs(headData.map(point2d));
    } catch (e) {
      removeLayerSafe(headLayer); headLayer = null;
      headLayer = makeRouteLayer(headData, fullMeta, 9);
      headLayer.addTo(map);
    }
  }

  function renderAtTime(t) {
    if (!ensureMap()) return;
    if (!fullData || fullData.length < 2) return;

    computeDuration();
    playheadS = clamp(t, 0.0, durationS);

    var prog = timeToProgress(playheadS);
    lastProgress = prog;

    var n = fullData.length;
    var p = clamp(prog, 0.0, n - 1);
    var i = Math.floor(p);
    var frac = p - i;

    if (!smoothEnabled) frac = 0.0;

    var a = fullData[i];
    var b = (i + 1 < n) ? fullData[i + 1] : fullData[i];

    var lat = a[0] + (b[0] - a[0]) * frac;
    var lon = a[1] + (b[1] - a[1]) * frac;

    var zA = (a.length > 2) ? a[2] : 0.0;
    var zB = (b.length > 2) ? b[2] : zA;
    var z = zA + (zB - zA) * frac;

    ensureQuadIcon();
    if (!droneMarker) {
      droneMarker = L.marker([lat, lon], { icon: quadIcon, interactive: false }).addTo(map);
    } else {
      droneMarker.setLatLng([lat, lon]);
    }

    if (followMode) map.panTo([lat, lon], { animate: false });

    ensureTrailToIndex(i);
    updateHeadSegment(i, lat, lon, z, frac);
  }

  function tick(nowMs) {
    if (!playing) return;

    if (lastFrameMs === null) lastFrameMs = nowMs;
    var dt = (nowMs - lastFrameMs) / 1000.0;
    lastFrameMs = nowMs;

    // Avoid massive leaps after stalls
    dt = clamp(dt, 0.0, 0.25);

    renderAtTime(playheadS + dt * speedMult);

    if (playheadS >= durationS - 1e-9) {
      playing = false;
      return;
    }

    requestAnimationFrame(tick);
  }

  // ----- Public API for Python -----

  window.setFollowMode = function(enabled) { followMode = !!enabled; };

  window.setFullPathVisible = function(enabled) {
    fullPathVisible = !!enabled;
    applyFullVisibilityNow();
  };

  window.setSmoothPlaybackEnabled = function(enabled) {
    smoothEnabled = !!enabled;
    renderAtTime(playheadS);
  };

  window.setPlaybackSpeed = function(mult) {
    var m = Number(mult);
    if (!isFinite(m) || m <= 0) m = 1.0;
    speedMult = m;
  };

  window.setTimelineSeconds = function(timeline) {
    if (Array.isArray(timeline) && timeline.length) timelineS = timeline;
    else timelineS = null;
    computeDuration();
    playheadS = clamp(playheadS, 0.0, durationS);
  };

  window.playPlayback = function() {
    if (!ensureMap()) return;
    if (!fullData || fullData.length < 2) return;

    computeDuration();
    playing = true;
    lastFrameMs = null;
    requestAnimationFrame(tick);
  };

  window.pausePlayback = function() {
    playing = false;
  };

  window.stopPlayback = function() {
    playing = false;
    lastFrameMs = null;
    renderAtTime(0.0);
  };

  window.seekPlaybackTime = function(t) {
    playing = false;
    lastFrameMs = null;
    renderAtTime(Number(t) || 0.0);
  };

  window.seekPlaybackIndex = function(idx) {
    if (!fullData || fullData.length < 2) return;
    var i = clamp(Math.floor(Number(idx) || 0), 0, fullData.length - 1);

    var t = 0.0;
    if (timelineS && timelineS.length === fullData.length) t = Number(timelineS[i]) || 0.0;
    else t = i;

    playing = false;
    lastFrameMs = null;
    renderAtTime(t);
  };

  // Back-compat: accept a float index progress
  window.setPlaybackProgress = function(progress) {
    if (!fullData || fullData.length < 2) return;
    var n = fullData.length;
    var p = clamp(Number(progress) || 0.0, 0.0, n - 1);
    var i = Math.floor(p);
    var frac = p - i;

    var t = 0.0;
    if (timelineS && timelineS.length === n) {
      var t0 = Number(timelineS[i]) || 0.0;
      var t1 = Number(timelineS[Math.min(i + 1, n - 1)]) || t0;
      t = t0 + (t1 - t0) * frac;
    } else {
      t = p;
    }
    window.seekPlaybackTime(t);
  };

  window.getPlaybackStatus = function() {
    computeDuration();
    return {
      time: playheadS,
      duration: durationS,
      playing: playing,
      progress: lastProgress
    };
  };

  window.clearTrack = function() {
    playing = false;
    lastFrameMs = null;
    playheadS = 0.0;
    lastProgress = 0.0;
    lastTrailIndex = -1;

    removeLayerSafe(fullLayer); fullLayer = null;
    removeLayerSafe(trailLayer); trailLayer = null;
    removeLayerSafe(headLayer); headLayer = null;

    removeLayerSafe(startMarker); startMarker = null;
    removeLayerSafe(endMarker); endMarker = null;
    removeLayerSafe(droneMarker); droneMarker = null;

    fullData = null;
    fullMeta = null;
    timelineS = null;
    durationS = 0.0;

    setLegend(null);
  };

  window.plotHotline = function(data, meta) {
    if (!ensureMap()) return;

    window.clearTrack();

    if (!data || data.length < 2) {
      map.setView([0, 0], 2);
      return;
    }

    fullData = data;
    fullMeta = meta || null;
    computeDuration();

    fullLayer = makeRouteLayer(fullData, fullMeta, 6);
    fullLayer.addTo(map);

    try {
      map.fitBounds(fullLayer.getBounds(), { padding: [20, 20] });
    } catch (e) {}

    var start = [fullData[0][0], fullData[0][1]];
    var end = [fullData[fullData.length - 1][0], fullData[fullData.length - 1][1]];
    startMarker = L.marker(start).addTo(map).bindPopup("Start");
    endMarker = L.marker(end).addTo(map).bindPopup("Last");

    setLegend(fullMeta);
    applyFullVisibilityNow();

    // Initialize drone + empty trail at start
    renderAtTime(0.0);
  };

  // Backward compatibility
  window.plotTrack = window.plotHotline;

  ensureMap();
</script>
</body>
</html>
